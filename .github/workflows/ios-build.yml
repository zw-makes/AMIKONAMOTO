name: Build iOS (Unsigned IPA)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    name: Build iOS App
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Silences Node 20 deprecation warnings
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://ptueakygbjohifkscplk.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0dWVha3lnYmpvaGlma3NjcGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQ0NjgsImV4cCI6MjA4ODEyMDQ2OH0.6x5_QVjhP6wYXVTBEpQ-eil2U5w0A0Qd0gncxrD53Zk"

      - name: Sync Capacitor iOS
        run: npx @capacitor/cli sync ios

      - name: Build unsigned iOS App
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build"

      - name: Package to IPA
        run: |
          cd ios/App/build
          mkdir Payload
          mv App.app Payload/
          zip -r AMIKONAMOTO.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMIKONAMOTO-iOS-App
          path: ios/App/build/AMIKONAMOTO.ipa
