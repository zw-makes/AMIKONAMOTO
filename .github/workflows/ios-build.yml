name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

jobs:
  build_ios:
    name: Build iOS App + Widget
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://ptueakygbjohifkscplk.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0dWVha3lnYmpvaGlma3NjcGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQ0NjgsImV4cCI6MjA4ODEyMDQ2OH0.6x5_QVjhP6wYXVTBEpQ-eil2U5w0A0Qd0gncxrD53Zk"

      - name: Sync Capacitor iOS
        run: npx @capacitor/cli sync ios

      - name: Inject Widget Target into Xcode Project
        run: |
          python3 << 'PYTHON_SCRIPT'
          pbxproj_path = "ios/App/App.xcodeproj/project.pbxproj"
          with open(pbxproj_path, "r") as f:
              content = f.read()

          if "SubTrackWidget" in content:
              print("Widget target already present. Skipping injection.")
              exit(0)

          print("Injecting SubTrackWidget target...")

          widget_build_files = """
          AA000001000000000000CAFE /* SubTrackWidget.swift in Sources */ = {isa = PBXBuildFile; fileRef = AA000002000000000000CAFE /* SubTrackWidget.swift */; };
          AA000009000000000000CAFE /* AppGroupManager.swift in Sources */ = {isa = PBXBuildFile; fileRef = AA000010000000000000CAFE /* AppGroupManager.swift */; };
          """
          content = content.replace("/* End PBXBuildFile section */", widget_build_files + "/* End PBXBuildFile section */")

          widget_file_refs = """
          AA000002000000000000CAFE /* SubTrackWidget.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = SubTrackWidget.swift; sourceTree = "<group>"; };
          AA000005000000000000CAFE /* SubTrackWidget.appex */ = {isa = PBXFileReference; explicitFileType = "wrapper.app-extension"; includeInIndex = 0; path = SubTrackWidget.appex; sourceTree = BUILT_PRODUCTS_DIR; };
          AA000010000000000000CAFE /* AppGroupManager.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = AppGroupManager.swift; sourceTree = "<group>"; };
          """
          content = content.replace("/* End PBXFileReference section */", widget_file_refs + "/* End PBXFileReference section */")

          widget_group = """
          AA000006000000000000CAFE /* SubTrackWidget */ = {
              isa = PBXGroup;
              children = (
                  AA000002000000000000CAFE /* SubTrackWidget.swift */,
              );
              path = SubTrackWidget;
              sourceTree = "<group>";
          };
          """
          content = content.replace("/* End PBXGroup section */", widget_group + "/* End PBXGroup section */")

          content = content.replace(
              "504EC3061FED79650016851F /* App */,",
              "504EC3061FED79650016851F /* App */,\n\t\t\t\tAA000006000000000000CAFE /* SubTrackWidget */,"
          )
          content = content.replace(
              "504EC3041FED79650016851F /* App.app */,",
              "504EC3041FED79650016851F /* App.app */,\n\t\t\t\tAA000005000000000000CAFE /* SubTrackWidget.appex */,"
          )
          content = content.replace(
              "504EC3071FED79650016851F /* AppDelegate.swift */,",
              "504EC3071FED79650016851F /* AppDelegate.swift */,\n\t\t\t\tAA000010000000000000CAFE /* AppGroupManager.swift */,"
          )

          widget_target = """
          AA000007000000000000CAFE /* SubTrackWidget */ = {
              isa = PBXNativeTarget;
              buildConfigurationList = AA00000B000000000000CAFE /* Build configuration list for PBXNativeTarget "SubTrackWidget" */;
              buildPhases = (
                  AA00000C000000000000CAFE /* Sources */,
                  AA00000D000000000000CAFE /* Resources */,
              );
              buildRules = ();
              dependencies = ();
              name = SubTrackWidget;
              productName = SubTrackWidget;
              productReference = AA000005000000000000CAFE /* SubTrackWidget.appex */;
              productType = "com.apple.product-type.app-extension";
          };
          """
          content = content.replace("/* End PBXNativeTarget section */", widget_target + "/* End PBXNativeTarget section */")

          content = content.replace(
              "504EC3031FED79650016851F /* App */,\n\t\t\t);",
              "504EC3031FED79650016851F /* App */,\n\t\t\t\tAA000007000000000000CAFE /* SubTrackWidget */,\n\t\t\t);"
          )

          widget_build_phases = """
          AA00000C000000000000CAFE /* Sources */ = {
              isa = PBXSourcesBuildPhase;
              buildActionMask = 2147483647;
              files = (
                  AA000001000000000000CAFE /* SubTrackWidget.swift in Sources */,
              );
              runOnlyForDeploymentPostprocessing = 0;
          };
          AA00000D000000000000CAFE /* Resources */ = {
              isa = PBXResourcesBuildPhase;
              buildActionMask = 2147483647;
              files = (
              );
              runOnlyForDeploymentPostprocessing = 0;
          };
          """
          content = content.replace("/* End PBXResourcesBuildPhase section */", widget_build_phases + "/* End PBXResourcesBuildPhase section */")

          content = content.replace(
              "504EC3081FED79650016851F /* AppDelegate.swift in Sources */,",
              "504EC3081FED79650016851F /* AppDelegate.swift in Sources */,\n\t\t\t\tAA000009000000000000CAFE /* AppGroupManager.swift in Sources */,"
          )

          widget_build_configs = """
          AA000008000000000000CAFE /* Debug */ = {
              isa = XCBuildConfiguration;
              buildSettings = {
                  CLANG_ENABLE_MODULES = YES;
                  CODE_SIGN_IDENTITY = "";
                  CODE_SIGNING_ALLOWED = NO;
                  CODE_SIGNING_REQUIRED = NO;
                  INFOPLIST_FILE = SubTrackWidget/Info.plist;
                  IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                  LD_RUNPATH_SEARCH_PATHS = ("$(inherited)", "@executable_path/Frameworks", "@executable_path/../../Frameworks");
                  PRODUCT_BUNDLE_IDENTIFIER = com.amikonamoto.app.SubTrackWidget;
                  PRODUCT_NAME = SubTrackWidget;
                  SDKROOT = iphoneos;
                  SKIP_INSTALL = YES;
                  SWIFT_VERSION = 5.0;
                  TARGETED_DEVICE_FAMILY = "1,2";
              };
              name = Debug;
          };
          AA0000AA000000000000CAFE /* Release */ = {
              isa = XCBuildConfiguration;
              buildSettings = {
                  CLANG_ENABLE_MODULES = YES;
                  CODE_SIGN_IDENTITY = "";
                  CODE_SIGNING_ALLOWED = NO;
                  CODE_SIGNING_REQUIRED = NO;
                  INFOPLIST_FILE = SubTrackWidget/Info.plist;
                  IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                  LD_RUNPATH_SEARCH_PATHS = ("$(inherited)", "@executable_path/Frameworks", "@executable_path/../../Frameworks");
                  PRODUCT_BUNDLE_IDENTIFIER = com.amikonamoto.app.SubTrackWidget;
                  PRODUCT_NAME = SubTrackWidget;
                  SDKROOT = iphoneos;
                  SKIP_INSTALL = YES;
                  SWIFT_COMPILATION_MODE = wholemodule;
                  SWIFT_OPTIMIZATION_LEVEL = "-O";
                  SWIFT_VERSION = 5.0;
                  TARGETED_DEVICE_FAMILY = "1,2";
              };
              name = Release;
          };
          """
          content = content.replace("/* End XCBuildConfiguration section */", widget_build_configs + "/* End XCBuildConfiguration section */")

          widget_config_list = """
          AA00000B000000000000CAFE /* Build configuration list for PBXNativeTarget "SubTrackWidget" */ = {
              isa = XCConfigurationList;
              buildConfigurations = (
                  AA000008000000000000CAFE /* Debug */,
                  AA0000AA000000000000CAFE /* Release */,
              );
              defaultConfigurationIsVisible = 0;
              defaultConfigurationName = Release;
          };
          """
          content = content.replace("/* End XCConfigurationList section */", widget_config_list + "/* End XCConfigurationList section */")

          with open(pbxproj_path, "w") as f:
              f.write(content)

          print("Widget target successfully injected!")
          PYTHON_SCRIPT

      - name: Build Main App (unsigned)
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build"

      - name: Build Widget Extension (unsigned)
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -target SubTrackWidget \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build-widget"

      - name: Embed Widget inside App.app and Package IPA
        run: |
          cd ios/App

          # Create the PlugIns directory inside App.app (this is where Apple looks for extensions)
          mkdir -p build/App.app/PlugIns

          # Copy the built widget extension into the app bundle
          cp -r build-widget/SubTrackWidget.appex build/App.app/PlugIns/SubTrackWidget.appex

          echo "Widget embedded! Contents of App.app/PlugIns:"
          ls -la build/App.app/PlugIns/

          # Package into IPA
          cd build
          mkdir Payload
          mv App.app Payload/
          zip -r AMIKONAMOTO.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMIKONAMOTO-iOS-App
          path: ios/App/build/AMIKONAMOTO.ipa
